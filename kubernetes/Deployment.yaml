apiVersion: apps/v1
kind: Deployment
metadata:
  name:  myapp
  labels:
    app:  myapp
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 1
  template:
    metadata:
      labels:
        app:  myapp
    spec:
      containers:
      - name: flask
        image: chikichik/myapp:1.0
        ports: 
        - containerPort: 8080
    